<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Analyzer — Анализ шахматных партий с ИИ-тренером</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
  />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f14;
      color: #e2e2e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      width: 100%;
      padding: 24px 0 12px;
      text-align: center;
      background: linear-gradient(180deg, #16161d 0%, #0f0f14 100%);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .header h1 {
      font-size: 1.6rem; font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #6ee7b7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -.5px;
    }
    .header p { font-size: .85rem; color: #737388; margin-top: 4px; }

    /* Layout */
    .container {
      display: flex; gap: 28px; padding: 32px 24px 48px;
      max-width: 1060px; width: 100%; flex-wrap: wrap; justify-content: center;
    }

    /* Board column */
    .board-col { display: flex; flex-direction: column; gap: 12px; }

    /* Eval bar */
    .eval-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; height: 42px;
    }
    .eval-score {
      font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums;
      min-width: 90px; text-align: center; transition: color .2s;
    }
    .eval-score.white-advantage { color: #f0f0f0; }
    .eval-score.black-advantage { color: #a0a0b4; }
    .eval-score.equal { color: #737388; }
    .eval-score.mate { color: #f87171; }
    .eval-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .6px; color: #52526a; }

    #board { width: 400px; border-radius: 10px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.45); }

    /* Nav */
    .nav-bar { display: flex; gap: 8px; justify-content: center; }
    .nav-bar button {
      flex: 1; max-width: 80px; padding: 10px 0; border: none; border-radius: 8px;
      background: #1e1e2a; color: #c4c4d4; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s, transform .1s;
    }
    .nav-bar button:hover { background: #2d2d40; }
    .nav-bar button:active { transform: scale(.95); }

    /* Chart */
    .chart-wrap {
      background: #16161f; border: 1px solid #2a2a3a; border-radius: 10px;
      padding: 12px 12px 6px; width: 400px;
    }
    .chart-wrap canvas { width: 100% !important; height: 130px !important; }

    /* Side panel */
    .side-panel {
      display: flex; flex-direction: column; gap: 14px;
      min-width: 300px; max-width: 420px; flex: 1;
    }

    /* Variations */
    #returnMainBtn {
      display: none; padding: 10px 14px; border: 1px solid #3b82f6; border-radius: 8px;
      background: rgba(59,130,246,.15); color: #60a5fa; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: all .2s; width: 100%; text-align: center; margin-bottom: 12px;
    }
    #returnMainBtn:hover { background: rgba(59,130,246,.25); }

    .variation-chip {
      background: rgba(255, 255, 255, 0.05); color: #a78bfa; border: 1px dashed rgba(167,139,250,.3);
    }
    .variation-chip.active {
      background: rgba(167,139,250,.2); border: 1px solid #a78bfa; color: #fff;
    }

    /* Chess.com loader */
    .chesscom-row {
      display: flex; gap: 8px; align-items: stretch;
    }
    #usernameInput {
      flex: 1; padding: 10px 12px; border: 1px solid #2a2a3a; border-radius: 8px;
      background: #16161f; color: #e2e2e8; font-size: .85rem;
      font-family: 'Inter', sans-serif;
    }
    #usernameInput:focus { outline: none; border-color: #6ee7b7; }
    #loadChesscomBtn {
      padding: 10px 14px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, #059669, #047857);
      color: #fff; font-size: .8rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: opacity .2s;
    }
    #loadChesscomBtn:hover { opacity: .88; }
    #loadChesscomBtn:disabled { opacity: .45; cursor: not-allowed; }

    /* PGN input */
    .pgn-group { display: flex; flex-direction: column; gap: 8px; }
    .pgn-group label {
      font-size: .8rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .8px; color: #737388;
    }
    #pgnInput {
      width: 100%; height: 120px; padding: 12px 14px;
      border: 1px solid #2a2a3a; border-radius: 10px;
      background: #16161f; color: #e2e2e8;
      font-family: 'Inter', monospace; font-size: .82rem;
      resize: vertical; transition: border-color .2s;
    }
    #pgnInput:focus { outline: none; border-color: #a78bfa; }

    /* Analyze button */
    #analyzeBtn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .1s; letter-spacing: .3px;
    }
    #analyzeBtn:hover { opacity: .9; }
    #analyzeBtn:active { transform: scale(.97); }
    #analyzeBtn:disabled { opacity: .45; cursor: not-allowed; }

    /* Info card */
    .info-card {
      background: #16161f; border: 1px solid #2a2a3a; border-radius: 12px;
      padding: 20px; display: flex; flex-direction: column; gap: 14px;
    }
    .info-card h3 {
      font-size: .75rem; text-transform: uppercase; letter-spacing: 1px; color: #737388;
    }
    .move-display { display: flex; align-items: center; gap: 14px; }
    .move-icon { font-size: 2.4rem; line-height: 1; min-width: 48px; text-align: center; }
    .move-details { display: flex; flex-direction: column; gap: 2px; }
    .move-san { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .move-category { font-size: .9rem; font-weight: 500; }
    .move-cpl { font-size: .78rem; color: #737388; }

    .cat-excellent  { color: #6ee7b7; }
    .cat-good       { color: #86efac; }
    .cat-inaccuracy { color: #fbbf24; }
    .cat-mistake    { color: #f87171; }
    .cat-blunder    { color: #ef4444; }
    .cat-brilliant  { color: #c084fc; }

    /* Gemini coach block */
    .gemini-block {
      margin-top: 8px; padding: 14px 16px;
      background: linear-gradient(135deg, rgba(124,58,237,.08), rgba(110,231,183,.06));
      border: 1px solid rgba(167,139,250,.2);
      border-radius: 10px;
    }
    .gemini-block-header {
      display: flex; align-items: center; gap: 6px;
      font-size: .72rem; text-transform: uppercase; letter-spacing: .8px;
      color: #a78bfa; margin-bottom: 8px; font-weight: 600;
    }
    .gemini-block-header span { font-size: 1rem; }
    .gemini-comment {
      font-size: .88rem; line-height: 1.5; color: #d0d0dc;
    }
    .gemini-comment.empty { color: #52526a; font-style: italic; }

    .move-counter {
      text-align: center; font-size: .8rem; color: #52526a;
      padding-top: 4px; border-top: 1px solid #1e1e2a;
    }

    /* Status */
    .status { font-size: .82rem; color: #737388; min-height: 22px; }
    .status.error { color: #f87171; }
    .status.success { color: #6ee7b7; }

    /* Moves list */
    .moves-list {
      max-height: 160px; overflow-y: auto; display: flex;
      flex-wrap: wrap; gap: 4px; padding: 8px 0;
    }
    .moves-list::-webkit-scrollbar { width: 4px; }
    .moves-list::-webkit-scrollbar-track { background: transparent; }
    .moves-list::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }

    .move-chip {
      padding: 4px 8px; border-radius: 6px; font-size: .75rem; font-weight: 500;
      cursor: pointer; background: #1e1e2a; color: #a0a0b4;
      transition: background .15s, color .15s; border: 1px solid transparent;
    }
    .move-chip:hover { background: #2d2d40; color: #e2e2e8; }
    .move-chip.active { background: #7c3aed; color: #fff; border-color: #a78bfa; }
    .move-chip .chip-icon { margin-right: 2px; }

    /* Legal move dots (Chess.com style) */
    .legal-move-dot {
      width: 25%; height: 25%;
      background-color: rgba(0, 0, 0, 0.25);
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }
    .legal-move-capture {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
      border-radius: 50%;
      border: 6px solid rgba(0, 0, 0, 0.25);
      background: transparent;
      pointer-events: none;
      z-index: 10;
      box-sizing: border-box;
    }

    /* Game Report */
    .report-card {
      display: none; background: #16161f; border: 1px solid #2a2a3a;
      border-radius: 12px; padding: 18px; flex-direction: column; gap: 16px;
    }
    .report-card h3 {
      font-size: .75rem; text-transform: uppercase; letter-spacing: 1px;
      color: #737388; margin: 0;
    }
    .accuracy-row {
      display: flex; gap: 12px;
    }
    .accuracy-block {
      flex: 1; border-radius: 10px; padding: 14px; text-align: center;
      display: flex; flex-direction: column; gap: 4px;
    }
    .accuracy-block.white-block {
      background: #f0f0f0; color: #1a1a2e;
    }
    .accuracy-block.black-block {
      background: #1e1e2a; color: #e2e2e8; border: 1px solid #2a2a3a;
    }
    .accuracy-pct {
      font-size: 2rem; font-weight: 700; font-variant-numeric: tabular-nums;
      line-height: 1.1;
    }
    .accuracy-label {
      font-size: .7rem; text-transform: uppercase; letter-spacing: .8px; opacity: .6;
    }
    .accuracy-bar {
      width: 100%; height: 6px; border-radius: 3px; background: rgba(0,0,0,.15);
      overflow: hidden; margin-top: 4px;
    }
    .accuracy-bar-fill {
      height: 100%; border-radius: 3px; transition: width .6s ease;
    }
    .white-block .accuracy-bar-fill { background: #1a1a2e; }
    .black-block .accuracy-bar-fill { background: #a78bfa; }

    .cat-grid {
      display: grid; grid-template-columns: auto 1fr 1fr; gap: 6px 12px;
      align-items: center; font-size: .82rem;
    }
    .cat-grid-header {
      font-size: .68rem; text-transform: uppercase; letter-spacing: .6px;
      color: #52526a; font-weight: 600; text-align: center;
    }
    .cat-label { display: flex; align-items: center; gap: 6px; color: #a0a0b4; }
    .cat-label .cat-icon { font-size: 1rem; }
    .cat-count { text-align: center; font-weight: 600; font-variant-numeric: tabular-nums; }
    .cat-count.w { color: #e2e2e8; }
    .cat-count.b { color: #a0a0b4; }

    .elo-verdict {
      margin-top: 4px; padding: 12px 14px; border-radius: 8px;
      background: linear-gradient(135deg, rgba(124,58,237,.1), rgba(110,231,183,.08));
      border: 1px solid rgba(167,139,250,.2);
      font-size: .85rem; line-height: 1.5; color: #d0d0dc;
    }
    .elo-verdict-header {
      font-size: .68rem; text-transform: uppercase; letter-spacing: .8px;
      color: #a78bfa; font-weight: 600; margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>♔ Chess Analyzer</h1>
    <p>Анализ партий с ИИ-тренером · Stockfish + Gemini</p>
  </div>

  <!-- Main -->
  <div class="container">

    <!-- Left: Board + Chart -->
    <div class="board-col">
      <div class="eval-bar" id="evalBar" style="visibility:hidden;">
        <span class="eval-label">Оценка</span>
        <span class="eval-score equal" id="evalScore">0.0</span>
      </div>

      <div id="board"></div>

      <div class="nav-bar">
        <button id="btnStart" title="В начало">⏮</button>
        <button id="btnPrev"  title="Назад">◀</button>
        <button id="btnNext"  title="Вперёд">▶</button>
        <button id="btnEnd"   title="В конец">⏭</button>
      </div>

      <div class="chart-wrap" id="chartWrap" style="display:none;">
        <canvas id="evalChart"></canvas>
      </div>
    </div>

    <!-- Right: Panel -->
    <div class="side-panel">

      <button id="returnMainBtn">↩ Вернуться к главной партии</button>

      <!-- Chess.com loader -->
      <div class="chesscom-row">
        <input type="text" id="usernameInput" placeholder="Никнейм Chess.com" />
        <button id="loadChesscomBtn">♟ Загрузить</button>
      </div>

      <!-- PGN input -->
      <div class="pgn-group">
        <label for="pgnInput">Или вставьте PGN вручную</label>
        <textarea id="pgnInput" placeholder="1. e4 e5 2. Nf3 Nc6 ..."></textarea>
      </div>
      <button id="analyzeBtn">🔍 Анализировать</button>
      <div id="status" class="status"></div>

      <!-- Move info -->
      <div class="info-card" id="infoCard" style="display:none;">
        <h3>Текущий ход</h3>
        <div class="move-display">
          <span class="move-icon" id="moveIcon">🌟</span>
          <div class="move-details">
            <span class="move-san" id="moveSan">—</span>
            <span class="move-category" id="moveCategory">—</span>
            <span class="move-cpl" id="moveCpl"></span>
          </div>
        </div>

        <!-- Gemini coach -->
        <div class="gemini-block" id="geminiBlock">
          <div class="gemini-block-header">
            <span>✨</span> Совет тренера Gemini
          </div>
          <div class="gemini-comment" id="geminiComment">—</div>
        </div>

        <div class="move-counter" id="moveCounter">— / —</div>
      </div>

      <div class="moves-list" id="movesList"></div>

      <!-- Game Report -->
      <div class="report-card" id="reportCard">
        <h3>📊 Отчёт о партии</h3>

        <div class="accuracy-row">
          <div class="accuracy-block white-block">
            <span class="accuracy-label">Белые</span>
            <span class="accuracy-pct" id="whiteAccuracy">0%</span>
            <div class="accuracy-bar"><div class="accuracy-bar-fill" id="whiteAccBar" style="width:0%"></div></div>
          </div>
          <div class="accuracy-block black-block">
            <span class="accuracy-label">Чёрные</span>
            <span class="accuracy-pct" id="blackAccuracy">0%</span>
            <div class="accuracy-bar"><div class="accuracy-bar-fill" id="blackAccBar" style="width:0%"></div></div>
          </div>
        </div>

        <div class="cat-grid">
          <div></div>
          <div class="cat-grid-header">♘ Белые</div>
          <div class="cat-grid-header">♞ Чёрные</div>

          <div class="cat-label"><span class="cat-icon">💎</span> Бриллиант</div>
          <div class="cat-count w" id="wBrilliant">0</div>
          <div class="cat-count b" id="bBrilliant">0</div>

          <div class="cat-label"><span class="cat-icon">🌟</span> Отличный</div>
          <div class="cat-count w" id="wExcellent">0</div>
          <div class="cat-count b" id="bExcellent">0</div>

          <div class="cat-label"><span class="cat-icon">✅</span> Хороший</div>
          <div class="cat-count w" id="wGood">0</div>
          <div class="cat-count b" id="bGood">0</div>

          <div class="cat-label"><span class="cat-icon">⁉️</span> Неточность</div>
          <div class="cat-count w" id="wInaccuracy">0</div>
          <div class="cat-count b" id="bInaccuracy">0</div>

          <div class="cat-label"><span class="cat-icon">❓</span> Ошибка</div>
          <div class="cat-count w" id="wMistake">0</div>
          <div class="cat-count b" id="bMistake">0</div>

          <div class="cat-label"><span class="cat-icon">🤡</span> Зевок</div>
          <div class="cat-count w" id="wBlunder">0</div>
          <div class="cat-count b" id="bBlunder">0</div>
        </div>

        <div class="elo-verdict" id="eloVerdict" style="display:none;">
          <div class="elo-verdict-header">✨ Оценка уровня игры</div>
          <span id="eloVerdictText"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>

  <script>
    // ==================================================================
    // State
    // ==================================================================
    let movesData = [];
    let currentIdx = -1;
    let chess_game = new Chess();
    let board = null;
    let evalChart = null;
    
    let branchPoint = -1;
    let variationMoves = [];
    let inVariation = false;

    // ==================================================================
    // Variations Logic
    // ==================================================================
    document.getElementById('returnMainBtn').addEventListener('click', () => {
      exitVariation();
    });

    function exitVariation() {
      if (!inVariation) return;
      inVariation = false;
      variationMoves = [];
      document.getElementById('returnMainBtn').style.display = 'none';
      // Rebuild chart from clean mainline data before navigating
      buildChart();
      goToIndex(branchPoint, false);
    }
    
    function getCurrentMoveData() {
        if (!inVariation) {
            return currentIdx >= 0 && currentIdx < movesData.length ? movesData[currentIdx] : null;
        } else {
            const varIdx = currentIdx - branchPoint - 1;
            return varIdx >= 0 && varIdx < variationMoves.length ? variationMoves[varIdx] : null;
        }
    }
    
    function getActiveMovesList() {
        if (!inVariation) return [...movesData];
        return movesData.slice(0, branchPoint + 1).concat(variationMoves);
    }

    // ==================================================================
    // Init board
    // ==================================================================
    
    function clearLegalDots() {
      document.querySelectorAll('.legal-move-dot, .legal-move-capture').forEach(el => el.remove());
    }

    function showLegalDots(square) {
      clearLegalDots();
      const moves = chess_game.moves({ square: square, verbose: true });
      if (!moves || moves.length === 0) return;

      const boardEl = document.getElementById('board');
      moves.forEach(m => {
        const targetSquareEl = boardEl.querySelector('.square-' + m.to);
        if (!targetSquareEl) return;
        // Make sure the square has position:relative for absolute children
        targetSquareEl.style.position = 'relative';
        const dot = document.createElement('div');
        // Use ring for captures, dot for empty squares
        dot.className = m.captured ? 'legal-move-capture' : 'legal-move-dot';
        targetSquareEl.appendChild(dot);
      });
    }

    function onDragStart(source, piece, position, orientation) {
      if (chess_game.game_over()) return false;
      if ((chess_game.turn() === 'w' && piece.search(/^b/) !== -1) ||
          (chess_game.turn() === 'b' && piece.search(/^w/) !== -1)) {
        return false;
      }
      showLegalDots(source);
      return true;
    }
    
    // onDrop MUST be synchronous — chessboard.js ignores Promise returns,
    // so an async function's 'return "snapback"' is silently swallowed.
    function onDrop(source, target) {
      clearLegalDots();

      const prevFen = chess_game.fen();
      const move = chess_game.move({
        from: source,
        to: target,
        promotion: 'q'
      });

      // Illegal move — snap the piece back immediately
      if (move === null) return 'snapback';

      const fen = chess_game.fen();
      const san = move.san;

      // If the move follows the mainline, just advance the index
      if (!inVariation && currentIdx + 1 < movesData.length && movesData[currentIdx + 1].san === san) {
          currentIdx = currentIdx + 1;
          board.position(chess_game.fen(), false);
          updateInfoPanel();
          buildChart();
          return;
      }

      // --- Entering or extending a variation ---
      if (!inVariation) {
          inVariation = true;
          branchPoint = currentIdx;
          variationMoves = [];
          document.getElementById('returnMainBtn').style.display = 'block';
      } else {
          const varIdx = currentIdx - branchPoint - 1;
          if (varIdx < variationMoves.length - 1) {
             variationMoves = variationMoves.slice(0, varIdx + 1);
          }
      }

      const prevMoveData = getCurrentMoveData();

      const tempMove = {
        san: san,
        color: move.color === 'w' ? 'white' : 'black',
        cpl: 0,
        eval: prevMoveData ? prevMoveData.eval : 0,
        score_display: '',
        category: 'Анализ...',
        icon: '⏳',
        comment: ''
      };

      variationMoves.push(tempMove);
      currentIdx = branchPoint + variationMoves.length;

      document.getElementById('infoCard').style.display = '';
      document.getElementById('chartWrap').style.display = '';

      buildMoveChips();
      buildChart();
      updateInfoPanel();

      // Fire-and-forget async server call
      analyzeLastVariationMove(fen, prevFen, san);
    }

    async function analyzeLastVariationMove(fen, prevFen, san) {
      try {
        const resp = await fetch('/analyze_position', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fen, prev_fen: prevFen, move_san: san }),
        });
        if (resp.ok) {
          const data = await resp.json();
          const vIdx = currentIdx - branchPoint - 1;
          if (vIdx >= 0 && vIdx < variationMoves.length) {
              variationMoves[vIdx] = data;
          }
          buildMoveChips();
          buildChart();
          updateInfoPanel();
        }
      } catch (e) {
        console.error('[analyze_position error]', e);
      }
    }

    // Sync board position with chess.js after every snap animation
    function onSnapEnd() {
      clearLegalDots();
      board.position(chess_game.fen(), false);
    }

    board = Chessboard('board', {
      draggable: true,
      position: 'start',
      pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
      appearSpeed: 150,
      moveSpeed: 150,
      onDragStart: onDragStart,
      onDrop: onDrop,
      onSnapEnd: onSnapEnd
    });

    // ==================================================================
    // Helpers
    // ==================================================================
    function categoryClass(cat) {
      const map = {
        'Отличный':      'cat-excellent',
        'Хороший':       'cat-good',
        'Неточность':    'cat-inaccuracy',
        'Ошибка':        'cat-mistake',
        'Зевок':         'cat-blunder',
        'Бриллиантовый': 'cat-brilliant',
      };
      return map[cat] || '';
    }

    function formatEval(m) {
      if (m && m.score_display && m.score_display.startsWith('#')) {
        return m.score_display;
      }
      const cp = m ? m.eval : 0;
      const val = (cp / 100).toFixed(1);
      return cp > 0 ? `+${val}` : val;
    }

    // ==================================================================
    // Eval display
    // ==================================================================
    function updateEvalDisplay() {
      const el = document.getElementById('evalScore');
      const bar = document.getElementById('evalBar');
      bar.style.visibility = 'visible';

      if (currentIdx < 0) {
        el.textContent = '0.0';
        el.className = 'eval-score equal';
        return;
      }
      const m = getCurrentMoveData();
      if (!m) return;
      const display = formatEval(m);
      el.textContent = display;

      if (display.startsWith('#')) {
        el.className = 'eval-score mate';
      } else if (m.eval > 30) {
        el.className = 'eval-score white-advantage';
      } else if (m.eval < -30) {
        el.className = 'eval-score black-advantage';
      } else {
        el.className = 'eval-score equal';
      }
    }

    // ==================================================================
    // Chart
    // ==================================================================
    function buildChart() {
      const ctx = document.getElementById('evalChart').getContext('2d');
      const activeMoves = getActiveMovesList();
      const labels = activeMoves.map((m, i) => {
        const num = Math.floor(i / 2) + 1;
        return m.color === 'white' ? `${num}.` : `${num}…`;
      });
      const data = activeMoves.map(m => {
          let e = parseFloat(m.eval) || 0;
          if (m.score_display && (m.score_display.startsWith('#') || m.score_display.startsWith('M'))) {
              e = (e > 0 || !m.score_display.includes('-')) ? 1000 : -1000;
          }
          return Math.max(-1000, Math.min(1000, e)) / 100;
      });

      if (evalChart) {
          evalChart.data.labels = labels;
          evalChart.data.datasets[0].data = data;
          evalChart.update('none');
      } else {
          evalChart = new Chart(ctx, {
            type: 'line',
            data: {
              labels,
              datasets: [{
                data,
                borderColor: '#a78bfa',
                borderWidth: 2,
                pointRadius: 0,
                pointHitRadius: 8,
                tension: 0.3,
                fill: {
                  target: { value: 0 },
                  above: 'rgba(167,139,250,0.12)',
                  below: 'rgba(239,68,68,0.12)',
                },
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: { duration: 300 },
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: '#1e1e2a',
                  titleColor: '#e2e2e8',
                  bodyColor: '#a0a0b4',
                  borderColor: '#2a2a3a',
                  borderWidth: 1,
                  callbacks: {
                    label: (ctx) => `${ctx.parsed.y > 0 ? '+' : ''}${ctx.parsed.y.toFixed(1)}`,
                  },
                },
                annotation: {
                  annotations: {
                    zeroLine: {
                      type: 'line',
                      yMin: 0, yMax: 0,
                      borderColor: '#52526a',
                      borderWidth: 1,
                      borderDash: [4, 4],
                    },
                    currentMove: {
                      type: 'line',
                      xMin: 0, xMax: 0,
                      borderColor: '#facc15',
                      borderWidth: 2,
                      display: false,
                    },
                  },
                },
              },
              scales: {
                x: {
                  ticks: { color: '#52526a', font: { size: 9 }, maxTicksLimit: 20 },
                  grid: { color: 'rgba(255,255,255,0.03)' },
                },
                y: {
                  ticks: {
                    color: '#52526a', font: { size: 10 },
                    callback: (v) => (v > 0 ? '+' : '') + v,
                  },
                  grid: { color: 'rgba(255,255,255,0.04)' },
                  suggestedMin: -5, suggestedMax: 5,
                },
              },
              onClick: (evt) => {
                const points = evalChart.getElementsAtEventForMode(evt, 'nearest', { intersect: false }, true);
                if (points.length) goToIndex(points[0].index);
              },
            },
          });
      }
    }

    function updateChartIndicator() {
      if (!evalChart) return;
      const ann = evalChart.options.plugins.annotation.annotations.currentMove;
      if (currentIdx < 0) {
        ann.display = false;
      } else {
        ann.display = true;
        ann.xMin = currentIdx;
        ann.xMax = currentIdx;
      }
      evalChart.update('none');
    }

    // ==================================================================
    // Info panel + Gemini comment
    // ==================================================================
    function updateInfoPanel() {
      const icon = document.getElementById('moveIcon');
      const san  = document.getElementById('moveSan');
      const cat  = document.getElementById('moveCategory');
      const cpl  = document.getElementById('moveCpl');
      const counter = document.getElementById('moveCounter');
      const gemini  = document.getElementById('geminiComment');

      if (currentIdx < 0) {
        icon.textContent = '♟';
        san.textContent  = 'Начальная позиция';
        cat.textContent  = '';
        cat.className    = 'move-category';
        cpl.textContent  = '';
        counter.textContent = `0 / ${getActiveMovesList().length}`;
        gemini.textContent = 'Выберите ход для получения совета';
        gemini.className = 'gemini-comment empty';
      } else {
        const m = getCurrentMoveData();
        if (m) {
            const moveNum = Math.floor(currentIdx / 2) + 1;
            const dots = m.color === 'white' ? '.' : '...';
    
            icon.textContent = m.icon;
            san.textContent  = `${moveNum}${dots} ${m.san}`;
            cat.textContent  = m.category;
            cat.className    = `move-category ${categoryClass(m.category)}`;
            cpl.textContent  = `CPL: ${m.cpl}`;
            counter.textContent = `${currentIdx + 1} / ${getActiveMovesList().length}`;
    
            // Gemini comment
            if (m.comment) {
              gemini.textContent = m.comment;
              gemini.className = 'gemini-comment';
            } else {
              gemini.textContent = 'Комментарий отсутствует';
              gemini.className = 'gemini-comment empty';
            }
        }
      }

      // highlight chip
      document.querySelectorAll('.move-chip').forEach((el, i) => {
        el.classList.toggle('active', i === currentIdx);
      });
      const activeChip = document.querySelector('.move-chip.active');
      if (activeChip) activeChip.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

      updateEvalDisplay();
      updateChartIndicator();
    }

    // ==================================================================
    // Navigation
    // ==================================================================
    function goToIndex(idx, isVariationMove = false) {
      chess_game.reset();
      
      if (!inVariation || !isVariationMove) {
        // We are clicking mainline or we are in variation but clicked a mainline chip
        if (inVariation && !isVariationMove) {
            if (idx <= branchPoint) {
                exitVariation();
                return; // exitVariation calls goToIndex(branchPoint)
            } else {
                exitVariation(); // Exit variation to jump further in mainline
            }
        }
        if (idx >= 0) {
          for (let i = 0; i <= idx && i < movesData.length; i++) {
            chess_game.move(movesData[i].san);
          }
        }
      } else {
        // Playing through variation tree
        if (branchPoint >= 0) {
          for (let i = 0; i <= branchPoint && i < movesData.length; i++) {
            chess_game.move(movesData[i].san);
          }
        }
        const varIdx = idx - branchPoint - 1;
        if (varIdx >= 0) {
            for (let i = 0; i <= varIdx && i < variationMoves.length; i++) {
              chess_game.move(variationMoves[i].san);
            }
        }
      }
      
      currentIdx = idx;
      board.position(chess_game.fen(), true);
      updateInfoPanel();
    }

    // ==================================================================
    // Move chips
    // ==================================================================
    function buildMoveChips() {
      const container = document.getElementById('movesList');
      container.innerHTML = '';
      
      // Mainline
      const limit = inVariation ? branchPoint : movesData.length - 1;
      for (let i = 0; i <= limit; i++) {
        const m = movesData[i];
        const chip = document.createElement('span');
        chip.className = 'move-chip';
        const moveNum = Math.floor(i / 2) + 1;
        const prefix = m.color === 'white' ? `${moveNum}. ` : '';
        chip.innerHTML = `<span class="chip-icon">${m.icon}</span>${prefix}${m.san}`;
        chip.addEventListener('click', () => goToIndex(i, false));
        container.appendChild(chip);
      }

      // Variation
      if (inVariation) {
        const div = document.createElement('div');
        div.style.width = '100%'; div.style.height = '4px'; div.style.background = 'transparent';
        container.appendChild(div);
        
        for (let i = 0; i < variationMoves.length; i++) {
          const m = variationMoves[i];
          const chip = document.createElement('span');
          chip.className = 'move-chip variation-chip';
          const actualIndex = branchPoint + 1 + i;
          const moveNum = Math.floor(actualIndex / 2) + 1;
          const prefix = m.color === 'white' ? `${moveNum}. ` : (i === 0 ? `${moveNum}... ` : '');
          chip.innerHTML = `<span class="chip-icon">${m.icon}</span>${prefix}${m.san}`;
          chip.addEventListener('click', () => goToIndex(actualIndex, true));
          container.appendChild(chip);
        }
      }
    }

    // ==================================================================
    // Nav buttons
    // ==================================================================
    document.getElementById('btnStart').addEventListener('click', () => goToIndex(-1, false));
    document.getElementById('btnPrev').addEventListener('click', () => {
      if (currentIdx > -1) {
          if (inVariation && currentIdx === branchPoint + 1) {
              exitVariation();
          } else {
              goToIndex(currentIdx - 1, inVariation);
          }
      }
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      if (inVariation) {
          if (currentIdx - branchPoint - 1 < variationMoves.length - 1) {
              goToIndex(currentIdx + 1, true);
          }
      } else {
          if (currentIdx < movesData.length - 1) {
              goToIndex(currentIdx + 1, false);
          }
      }
    });
    document.getElementById('btnEnd').addEventListener('click', () => {
      if (inVariation) {
          if (variationMoves.length) goToIndex(branchPoint + variationMoves.length, true);
      } else {
          if (movesData.length) goToIndex(movesData.length - 1, false);
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowLeft')  document.getElementById('btnPrev').click();
      if (e.key === 'ArrowRight') document.getElementById('btnNext').click();
      if (e.key === 'Home')       document.getElementById('btnStart').click();
      if (e.key === 'End')        document.getElementById('btnEnd').click();
    });

    // ==================================================================
    // Load from Chess.com
    // ==================================================================
    document.getElementById('loadChesscomBtn').addEventListener('click', async () => {
      const username = document.getElementById('usernameInput').value.trim();
      if (!username) return;

      const btn = document.getElementById('loadChesscomBtn');
      const status = document.getElementById('status');

      btn.disabled = true;
      btn.textContent = '⏳…';
      status.className = 'status';
      status.textContent = `Загружаю последнюю партию ${username}…`;

      try {
        const resp = await fetch(`/get_latest_game/${encodeURIComponent(username)}`);
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        document.getElementById('pgnInput').value = data.pgn;
        status.className = 'status success';
        status.textContent = `✓ PGN загружен` + (data.url ? ` · ${data.url}` : '');
      } catch (e) {
        status.className = 'status error';
        status.textContent = `✗ ${e.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = '♟ Загрузить';
      }
    });

    // ==================================================================
    // Analyze
    // ==================================================================
    document.getElementById('analyzeBtn').addEventListener('click', async () => {
      const pgn = document.getElementById('pgnInput').value.trim();
      if (!pgn) return;

      const btn = document.getElementById('analyzeBtn');
      const status = document.getElementById('status');

      btn.disabled = true;
      btn.textContent = '⏳ Анализ…';
      status.className = 'status';
      status.textContent = 'Stockfish анализирует + Gemini комментирует… Это может занять время.';

      try {
        const resp = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pgn }),
        });

        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }

        const data = await resp.json();
        movesData = data.moves_data;
        currentIdx = -1;
        inVariation = false;
        branchPoint = -1;
        variationMoves = [];
        document.getElementById('returnMainBtn').style.display = 'none';

        chess_game.reset();
        board.position('start', false);

        document.getElementById('infoCard').style.display = '';
        document.getElementById('chartWrap').style.display = '';

        buildMoveChips();
        buildChart();
        updateInfoPanel();

        // Render Game Report
        if (data.stats) renderReport(data.stats, data.elo_verdict);

        const hasComments = movesData.some(m => m.comment);
        status.className = 'status success';
        status.textContent = `✓ ${movesData.length} ходов` +
          (hasComments ? ' · Комментарии Gemini загружены' : ' · Без комментариев Gemini');
      } catch (e) {
        status.className = 'status error';
        status.textContent = `✗ ${e.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍 Анализировать';
      }
    });

    // ==================================================================
    // Game Report
    // ==================================================================
    function renderReport(stats, eloVerdict) {
      const card = document.getElementById('reportCard');
      card.style.display = 'flex';

      // Accuracy
      document.getElementById('whiteAccuracy').textContent = stats.white.accuracy + '%';
      document.getElementById('blackAccuracy').textContent = stats.black.accuracy + '%';
      document.getElementById('whiteAccBar').style.width = stats.white.accuracy + '%';
      document.getElementById('blackAccBar').style.width = stats.black.accuracy + '%';

      // Category counters
      document.getElementById('wBrilliant').textContent = stats.white.brilliant || 0;
      document.getElementById('bBrilliant').textContent = stats.black.brilliant || 0;
      document.getElementById('wExcellent').textContent = stats.white.excellent || 0;
      document.getElementById('bExcellent').textContent = stats.black.excellent || 0;
      document.getElementById('wGood').textContent = stats.white.good || 0;
      document.getElementById('bGood').textContent = stats.black.good || 0;
      document.getElementById('wInaccuracy').textContent = stats.white.inaccuracy || 0;
      document.getElementById('bInaccuracy').textContent = stats.black.inaccuracy || 0;
      document.getElementById('wMistake').textContent = stats.white.mistake || 0;
      document.getElementById('bMistake').textContent = stats.black.mistake || 0;
      document.getElementById('wBlunder').textContent = stats.white.blunder || 0;
      document.getElementById('bBlunder').textContent = stats.black.blunder || 0;

      // ELO verdict
      const verdictEl = document.getElementById('eloVerdict');
      if (eloVerdict) {
        document.getElementById('eloVerdictText').textContent = eloVerdict;
        verdictEl.style.display = '';
      } else {
        verdictEl.style.display = 'none';
      }
    }
  </script>

</body>
