<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Analyzer — Анализ шахматных партий с ИИ-тренером</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
  />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f0f14;
      color: #e2e2e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      width: 100%;
      padding: 24px 0 12px;
      text-align: center;
      background: linear-gradient(180deg, #16161d 0%, #0f0f14 100%);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .header h1 {
      font-size: 1.6rem; font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #6ee7b7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -.5px;
    }
    .header p { font-size: .85rem; color: #737388; margin-top: 4px; }

    /* Layout */
    .container {
      display: flex; gap: 28px; padding: 32px 24px 48px;
      max-width: 1060px; width: 100%; flex-wrap: wrap; justify-content: center;
    }

    /* Board column */
    .board-col { display: flex; flex-direction: column; gap: 12px; }

    /* Eval bar */
    .eval-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; height: 42px;
    }
    .eval-score {
      font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums;
      min-width: 90px; text-align: center; transition: color .2s;
    }
    .eval-score.white-advantage { color: #f0f0f0; }
    .eval-score.black-advantage { color: #a0a0b4; }
    .eval-score.equal { color: #737388; }
    .eval-score.mate { color: #f87171; }
    .eval-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .6px; color: #52526a; }

    #board { width: 400px; border-radius: 10px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.45); }

    /* Nav */
    .nav-bar { display: flex; gap: 8px; justify-content: center; }
    .nav-bar button {
      flex: 1; max-width: 80px; padding: 10px 0; border: none; border-radius: 8px;
      background: #1e1e2a; color: #c4c4d4; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background .2s, transform .1s;
    }
    .nav-bar button:hover { background: #2d2d40; }
    .nav-bar button:active { transform: scale(.95); }

    /* Chart */
    .chart-wrap {
      background: #16161f; border: 1px solid #2a2a3a; border-radius: 10px;
      padding: 12px 12px 6px; width: 400px;
    }
    .chart-wrap canvas { width: 100% !important; height: 130px !important; }

    /* Side panel */
    .side-panel {
      display: flex; flex-direction: column; gap: 14px;
      min-width: 300px; max-width: 420px; flex: 1;
    }

    /* Variations */
    #returnMainBtn {
      display: none; padding: 10px 14px; border: 1px solid #3b82f6; border-radius: 8px;
      background: rgba(59,130,246,.15); color: #60a5fa; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: all .2s; width: 100%; text-align: center; margin-bottom: 12px;
    }
    #returnMainBtn:hover { background: rgba(59,130,246,.25); }

    .variation-chip {
      background: rgba(255, 255, 255, 0.05); color: #a78bfa; border: 1px dashed rgba(167,139,250,.3);
    }
    .variation-chip.active {
      background: rgba(167,139,250,.2); border: 1px solid #a78bfa; color: #fff;
    }

    /* Chess.com loader */
    .chesscom-row {
      display: flex; gap: 8px; align-items: stretch;
    }
    #usernameInput {
      flex: 1; padding: 10px 12px; border: 1px solid #2a2a3a; border-radius: 8px;
      background: #16161f; color: #e2e2e8; font-size: .85rem;
      font-family: 'Inter', sans-serif;
    }
    #usernameInput:focus { outline: none; border-color: #6ee7b7; }
    #loadChesscomBtn {
      padding: 10px 14px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, #059669, #047857);
      color: #fff; font-size: .8rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; transition: opacity .2s;
    }
    #loadChesscomBtn:hover { opacity: .88; }
    #loadChesscomBtn:disabled { opacity: .45; cursor: not-allowed; }

    /* PGN input */
    .pgn-group { display: flex; flex-direction: column; gap: 8px; }
    .pgn-group label {
      font-size: .8rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .8px; color: #737388;
    }
    #pgnInput {
      width: 100%; height: 120px; padding: 12px 14px;
      border: 1px solid #2a2a3a; border-radius: 10px;
      background: #16161f; color: #e2e2e8;
      font-family: 'Inter', monospace; font-size: .82rem;
      resize: vertical; transition: border-color .2s;
    }
    #pgnInput:focus { outline: none; border-color: #a78bfa; }

    /* Analyze button */
    #analyzeBtn {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff; font-size: .95rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s, transform .1s; letter-spacing: .3px;
    }
    #analyzeBtn:hover { opacity: .9; }
    #analyzeBtn:active { transform: scale(.97); }
    #analyzeBtn:disabled { opacity: .45; cursor: not-allowed; }

    /* Info card */
    .info-card {
      background: #16161f; border: 1px solid #2a2a3a; border-radius: 12px;
      padding: 20px; display: flex; flex-direction: column; gap: 14px;
    }
    .info-card h3 {
      font-size: .75rem; text-transform: uppercase; letter-spacing: 1px; color: #737388;
    }
    .move-display { display: flex; align-items: center; gap: 14px; }
    .move-icon { font-size: 2.4rem; line-height: 1; min-width: 48px; text-align: center; }
    .move-details { display: flex; flex-direction: column; gap: 2px; }
    .move-san { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .move-category { font-size: .9rem; font-weight: 500; }
    .move-cpl { font-size: .78rem; color: #737388; }

    .cat-excellent  { color: #6ee7b7; }
    .cat-good       { color: #86efac; }
    .cat-inaccuracy { color: #fbbf24; }
    .cat-mistake    { color: #f87171; }
    .cat-blunder    { color: #ef4444; }
    .cat-brilliant  { color: #c084fc; }

    /* Gemini coach block */
    .gemini-block {
      margin-top: 8px; padding: 14px 16px;
      background: linear-gradient(135deg, rgba(124,58,237,.08), rgba(110,231,183,.06));
      border: 1px solid rgba(167,139,250,.2);
      border-radius: 10px;
    }
    .gemini-block-header {
      display: flex; align-items: center; gap: 6px;
      font-size: .72rem; text-transform: uppercase; letter-spacing: .8px;
      color: #a78bfa; margin-bottom: 8px; font-weight: 600;
    }
    .gemini-block-header span { font-size: 1rem; }
    .gemini-comment {
      font-size: .88rem; line-height: 1.5; color: #d0d0dc;
    }
    .gemini-comment.empty { color: #52526a; font-style: italic; }

    .move-counter {
      text-align: center; font-size: .8rem; color: #52526a;
      padding-top: 4px; border-top: 1px solid #1e1e2a;
    }

    /* Status */
    .status { font-size: .82rem; color: #737388; min-height: 22px; }
    .status.error { color: #f87171; }
    .status.success { color: #6ee7b7; }

    /* Moves list */
    .moves-list {
      max-height: 160px; overflow-y: auto; display: flex;
      flex-wrap: wrap; gap: 4px; padding: 8px 0;
    }
    .moves-list::-webkit-scrollbar { width: 4px; }
    .moves-list::-webkit-scrollbar-track { background: transparent; }
    .moves-list::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 4px; }

    .move-chip {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px; border-radius: 6px; font-size: .75rem; font-weight: 500;
      cursor: pointer; background: #1e1e2a; color: #a0a0b4;
      transition: background .15s, color .15s; border: 1px solid transparent;
    }
    .move-chip:hover { background: #2d2d40; color: #e2e2e8; }
    .move-chip.active { background: #3a3a50; color: #fff; border-color: #7c3aed; }
    
    .chip-badge {
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .45rem; font-weight: 800; color: #fff;
    }
    /* Cat CSS for chips uses same logic as report */

    /* Tabs */
    .tabs-container {
      display: none; /* hidden until analyzed */
      gap: 4px; margin-bottom: 12px;
      background: #1e1e2a; padding: 4px; border-radius: 10px;
    }
    .tab-btn {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      background: transparent; color: #737388; font-size: .85rem; font-weight: 600;
      cursor: pointer; transition: background .2s, color .2s;
    }
    .tab-btn.active {
      background: #3a3a50; color: #e2e2e8; box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }

    /* Opening Badge */
    .opening-badge {
      font-size: .7rem; background: rgba(167, 139, 250, 0.15); color: #a78bfa;
      padding: 2px 8px; border-radius: 4px; margin-top: 4px; display: inline-block;
    }

    /* Coach avatar inside infoCard */
    .info-coach-avatar {
      font-size: 1.8rem; line-height: 1; margin-right: 8px;
    }

    /* Legal move dots (Chess.com style) */
    .legal-move-dot {
      width: 25%; height: 25%;
      background-color: rgba(0, 0, 0, 0.25);
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10;
    }
    .legal-move-capture {
      width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
      border-radius: 50%;
      border: 6px solid rgba(0, 0, 0, 0.25);
      background: transparent;
      pointer-events: none;
      z-index: 10;
      box-sizing: border-box;
    }

    /* Best move highlight */
    .highlight-best-move {
      box-shadow: inset 0 0 0 4px rgba(129, 182, 76, 0.8);
    }

    /* ============ Game Report (Chess.com style) ============ */
    .report-card {
      display: none; background: #262626; border-radius: 12px;
      flex-direction: column; gap: 0; overflow: hidden;
      border: 1px solid #333;
    }

    /* Coach bubble */
    .coach-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 16px 16px 12px;
      background: #2b2b2b;
    }
    .coach-avatar {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #5b8c5a 0%, #3a6b39 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .coach-bubble {
      background: #f0f0f0; color: #1a1a1a; border-radius: 12px;
      padding: 10px 14px; font-size: .85rem; line-height: 1.45;
      position: relative; flex: 1;
    }
    .coach-bubble::before {
      content: ''; position: absolute; left: -6px; top: 14px;
      border: 6px solid transparent; border-right-color: #f0f0f0;
      border-left: 0;
    }

    /* Player row + accuracy */
    .players-accuracy {
      display: flex; gap: 8px; padding: 12px 16px;
    }
    .player-acc-block {
      flex: 1; border-radius: 8px; padding: 10px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .player-acc-block.winner {
      background: #f0f0f0; color: #1a1a1a;
    }
    .player-acc-block.loser {
      background: #333; color: #999;
    }
    .player-acc-name {
      font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; opacity: .7;
    }
    .player-acc-pct {
      font-size: 1.8rem; font-weight: 800; line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .player-acc-sub {
      font-size: .65rem; opacity: .5; text-transform: uppercase; letter-spacing: .6px;
    }
    .acc-progress {
      width: 100%; height: 5px; border-radius: 3px;
      background: rgba(0,0,0,.2); margin-top: 4px; overflow: hidden;
    }
    .acc-progress-fill {
      height: 100%; border-radius: 3px; transition: width .8s ease;
    }
    .winner .acc-progress-fill { background: #1a1a1a; }
    .loser .acc-progress-fill { background: #81b64c; }

    /* Move category grid — centered icons */
    .cat-grid-v2 {
      display: flex; flex-direction: column; gap: 0;
      padding: 4px 16px 8px;
    }
    .cat-row {
      display: grid; grid-template-columns: 1fr 36px 1fr;
      align-items: center; padding: 5px 0;
      border-bottom: 1px solid #333;
    }
    .cat-row:last-child { border-bottom: none; }
    .cat-cnt-w { text-align: right; padding-right: 10px; font-weight: 700; font-size: .95rem; color: #e2e2e8; font-variant-numeric: tabular-nums; }
    .cat-cnt-b { text-align: left; padding-left: 10px; font-weight: 700; font-size: .95rem; color: #999; font-variant-numeric: tabular-nums; }
    .cat-icon-circle {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 800; color: #fff;
      margin: 0 auto; letter-spacing: -.5px;
    }
    .cat-brilliant  { background: #1baca6; }
    .cat-great      { background: #5c8bb0; }
    .cat-best       { background: #98bc4b; }
    .cat-excellent  { background: #98bc4b; }
    .cat-good       { background: #97af8b; }
    .cat-book       { background: #a88652; }
    .cat-inaccuracy { background: #e6a735; }
    .cat-mistake    { background: #e08a30; }
    .cat-miss       { background: #c45c4a; }
    .cat-blunder    { background: #ca3431; }

    /* ELO rating block */
    .elo-row {
      display: flex; gap: 8px; padding: 8px 16px 12px;
    }
    .elo-block {
      flex: 1; border-radius: 8px; padding: 10px; text-align: center;
    }
    .elo-block.elo-high { background: #f0f0f0; color: #1a1a1a; }
    .elo-block.elo-low  { background: #333; color: #999; }
    .elo-title {
      font-size: .6rem; text-transform: uppercase; letter-spacing: .8px;
      opacity: .6; margin-bottom: 2px;
    }
    .elo-number {
      font-size: 1.6rem; font-weight: 800; line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* Stage breakdown */
    .stages-section {
      padding: 8px 16px 12px;
      border-top: 1px solid #333;
    }
    .stages-title {
      font-size: .65rem; text-transform: uppercase; letter-spacing: 1px;
      color: #666; margin-bottom: 8px; text-align: center;
    }
    .stage-row {
      display: grid; grid-template-columns: 30px 1fr 30px;
      align-items: center; padding: 4px 0; gap: 8px;
    }
    .stage-icon { text-align: center; font-size: .9rem; }
    .stage-label { text-align: center; font-size: .82rem; color: #aaa; }
    .stage-check { color: #81b64c; }
    .stage-thumb { color: #e6a735; }
    .stage-inacc { color: #e08a30; }

    /* Action buttons */
    .report-actions {
      display: flex; gap: 8px; padding: 8px 16px 14px;
    }
    .report-btn {
      flex: 1; padding: 12px; border-radius: 8px; border: none;
      font-size: .85rem; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
    }
    .report-btn:hover { opacity: .85; }
    .btn-new-game {
      background: #404040; color: #e2e2e8;
    }
    .btn-view-report {
      background: #81b64c; color: #fff;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>♔ Chess Analyzer</h1>
    <p>Анализ партий с ИИ-тренером · Stockfish + Gemini</p>
  </div>

  <!-- Main -->
  <div class="container">

    <!-- Left: Board + Chart -->
    <div class="board-col">
      <div class="eval-bar" id="evalBar" style="visibility:hidden;">
        <span class="eval-label">Оценка</span>
        <span class="eval-score equal" id="evalScore">0.0</span>
      </div>

      <div id="board"></div>

      <div class="nav-bar">
        <button id="btnStart" title="В начало">⏮</button>
        <button id="btnPrev"  title="Назад">◀</button>
        <button id="btnNext"  title="Вперёд">▶</button>
        <button id="btnEnd"   title="В конец">⏭</button>
      </div>

      <div class="chart-wrap" id="chartWrap" style="display:none;">
        <canvas id="evalChart"></canvas>
      </div>
    </div>

    <!-- Right: Panel -->
    <div class="side-panel">

      <button id="returnMainBtn">↩ Вернуться к главной партии</button>

      <!-- Chess.com loader -->
      <div class="chesscom-row">
        <input type="text" id="usernameInput" placeholder="Никнейм Chess.com" />
        <button id="loadChesscomBtn">♟ Загрузить</button>
      </div>

      <!-- PGN input -->
      <div class="pgn-group">
        <label for="pgnInput">Или вставьте PGN вручную</label>
        <textarea id="pgnInput" placeholder="1. e4 e5 2. Nf3 Nc6 ..."></textarea>
      </div>
      <button id="analyzeBtn">🔍 Анализировать</button>
      <div id="status" class="status"></div>

      <!-- Tabs -->
      <div class="tabs-container" id="tabsContainer">
        <button class="tab-btn active" id="tabMoves">Ходы партии</button>
        <button class="tab-btn" id="tabReport">Отчет о партии</button>
      </div>

      <div id="contentMoves" style="display:none;">
        <!-- Move info -->
        <div class="info-card" id="infoCard">
          <h3>Текущий ход</h3>
          <div class="move-display">
            <span class="info-coach-avatar" id="infoCoachAvatar">😐</span>
            <div class="move-details">
              <span class="move-san" id="moveSan">—</span>
              <div id="openingName" class="opening-badge" style="display:none;"></div>
              <span class="move-category" id="moveCategory">—</span>
              <span class="move-cpl" id="moveCpl"></span>
            </div>
          </div>

          <!-- Gemini coach -->
          <div class="gemini-block" id="geminiBlock">
            <div class="gemini-block-header">
              <span>✨</span> Совет тренера Gemini
            </div>
            <div class="gemini-comment" id="geminiComment">—</div>
          </div>

          <div class="move-counter" id="moveCounter">— / —</div>
        </div>

        <div class="moves-list" id="movesList"></div>
      </div>

      <!-- Game Report (Chess.com style) -->
      <div class="report-card" id="reportCard" style="display:none;">
        <!-- Coach -->
        <div class="coach-row">
          <div class="coach-avatar">🧔</div>
          <div class="coach-bubble" id="coachBubble">Анализирую партию…</div>
        </div>

        <!-- Accuracy -->
        <div class="players-accuracy">
          <div class="player-acc-block winner" id="whiteAccBlock">
            <span class="player-acc-name">Белые</span>
            <span class="player-acc-pct" id="whiteAccPct">0%</span>
            <span class="player-acc-sub">Точность</span>
            <div class="acc-progress"><div class="acc-progress-fill" id="whiteAccBar" style="width:0%"></div></div>
          </div>
          <div class="player-acc-block loser" id="blackAccBlock">
            <span class="player-acc-name">Чёрные</span>
            <span class="player-acc-pct" id="blackAccPct">0%</span>
            <span class="player-acc-sub">Точность</span>
            <div class="acc-progress"><div class="acc-progress-fill" id="blackAccBar" style="width:0%"></div></div>
          </div>
        </div>

        <!-- Category grid -->
        <div class="cat-grid-v2" id="catGrid"></div>

        <!-- ELO rating -->
        <div class="elo-row">
          <div class="elo-block elo-high" id="eloBlockW">
            <div class="elo-title">Рейтинг партии</div>
            <div class="elo-number" id="eloWhite">—</div>
          </div>
          <div class="elo-block elo-low" id="eloBlockB">
            <div class="elo-title">Рейтинг партии</div>
            <div class="elo-number" id="eloBlack">—</div>
          </div>
        </div>

        <!-- Stages -->
        <div class="stages-section">
          <div class="stages-title">Разбивка по стадиям</div>
          <div class="stage-row">
            <div class="stage-icon" id="stageOpenW"></div>
            <div class="stage-label">Дебют</div>
            <div class="stage-icon" id="stageOpenB"></div>
          </div>
          <div class="stage-row">
            <div class="stage-icon" id="stageMidW"></div>
            <div class="stage-label">Миттельшпиль</div>
            <div class="stage-icon" id="stageMidB"></div>
          </div>
          <div class="stage-row">
            <div class="stage-icon" id="stageEndW"></div>
            <div class="stage-label">Эндшпиль</div>
            <div class="stage-icon" id="stageEndB"></div>
          </div>
        </div>

        <!-- Actions -->
        <div class="report-actions">
          <button class="report-btn btn-new-game" id="btnNewGame">Новая партия</button>
          <button class="report-btn btn-view-report" id="btnViewReport">Смотреть отчет</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>

  <script>
    // ==================================================================
    // State
    // ==================================================================
    let movesData = [];
    let currentIdx = -1;
    let chess_game = new Chess();
    let board = null;
    let evalChart = null;
    
    let branchPoint = -1;
    let variationMoves = [];
    let inVariation = false;

    // ==================================================================
    // Variations Logic
    // ==================================================================
    document.getElementById('returnMainBtn').addEventListener('click', () => {
      exitVariation();
    });

    function exitVariation() {
      if (!inVariation) return;
      inVariation = false;
      variationMoves = [];
      document.getElementById('returnMainBtn').style.display = 'none';
      // Rebuild chart from clean mainline data before navigating
      buildChart();
      goToIndex(branchPoint, false);
    }
    
    function getCurrentMoveData() {
        if (!inVariation) {
            return currentIdx >= 0 && currentIdx < movesData.length ? movesData[currentIdx] : null;
        } else {
            const varIdx = currentIdx - branchPoint - 1;
            return varIdx >= 0 && varIdx < variationMoves.length ? variationMoves[varIdx] : null;
        }
    }
    
    function getActiveMovesList() {
        if (!inVariation) return [...movesData];
        return movesData.slice(0, branchPoint + 1).concat(variationMoves);
    }

    // ==================================================================
    // Init board
    // ==================================================================
    
    function clearLegalDots() {
      document.querySelectorAll('.legal-move-dot, .legal-move-capture').forEach(el => el.remove());
    }

    function showLegalDots(square) {
      clearLegalDots();
      const moves = chess_game.moves({ square: square, verbose: true });
      if (!moves || moves.length === 0) return;

      const boardEl = document.getElementById('board');
      moves.forEach(m => {
        const targetSquareEl = boardEl.querySelector('.square-' + m.to);
        if (!targetSquareEl) return;
        // Make sure the square has position:relative for absolute children
        targetSquareEl.style.position = 'relative';
        const dot = document.createElement('div');
        // Use ring for captures, dot for empty squares
        dot.className = m.captured ? 'legal-move-capture' : 'legal-move-dot';
        targetSquareEl.appendChild(dot);
      });
    }

    function onDragStart(source, piece, position, orientation) {
      if (chess_game.game_over()) return false;
      if ((chess_game.turn() === 'w' && piece.search(/^b/) !== -1) ||
          (chess_game.turn() === 'b' && piece.search(/^w/) !== -1)) {
        return false;
      }
      showLegalDots(source);
      return true;
    }
    
    // onDrop MUST be synchronous — chessboard.js ignores Promise returns,
    // so an async function's 'return "snapback"' is silently swallowed.
    function onDrop(source, target) {
      clearLegalDots();

      const prevFen = chess_game.fen();
      const move = chess_game.move({
        from: source,
        to: target,
        promotion: 'q'
      });

      // Illegal move — snap the piece back immediately
      if (move === null) return 'snapback';

      const fen = chess_game.fen();
      const san = move.san;

      // If the move follows the mainline, just advance the index
      if (!inVariation && currentIdx + 1 < movesData.length && movesData[currentIdx + 1].san === san) {
          currentIdx = currentIdx + 1;
          board.position(chess_game.fen(), false);
          updateInfoPanel();
          buildChart();
          return;
      }

      // --- Entering or extending a variation ---
      if (!inVariation) {
          inVariation = true;
          branchPoint = currentIdx;
          variationMoves = [];
          document.getElementById('returnMainBtn').style.display = 'block';
      } else {
          const varIdx = currentIdx - branchPoint - 1;
          if (varIdx < variationMoves.length - 1) {
             variationMoves = variationMoves.slice(0, varIdx + 1);
          }
      }

      const prevMoveData = getCurrentMoveData();

      const tempMove = {
        san: san,
        color: move.color === 'w' ? 'white' : 'black',
        cpl: 0,
        eval: prevMoveData ? prevMoveData.eval : 0,
        score_display: '',
        category: 'Анализ...',
        icon: '⏳',
        comment: ''
      };

      variationMoves.push(tempMove);
      currentIdx = branchPoint + variationMoves.length;

      document.getElementById('infoCard').style.display = '';
      document.getElementById('chartWrap').style.display = '';

      buildMoveChips();
      buildChart();
      updateInfoPanel();

      // Fire-and-forget async server call
      analyzeLastVariationMove(fen, prevFen, san);
    }

    async function analyzeLastVariationMove(fen, prevFen, san) {
      try {
        const resp = await fetch('/analyze_position', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fen, prev_fen: prevFen, move_san: san }),
        });
        if (resp.ok) {
          const data = await resp.json();
          const vIdx = currentIdx - branchPoint - 1;
          if (vIdx >= 0 && vIdx < variationMoves.length) {
              variationMoves[vIdx] = data;
          }
          buildMoveChips();
          buildChart();
          updateInfoPanel();
        }
      } catch (e) {
        console.error('[analyze_position error]', e);
      }
    }

    // Sync board position with chess.js after every snap animation
    function onSnapEnd() {
      clearLegalDots();
      board.position(chess_game.fen(), false);
    }

    board = Chessboard('board', {
      draggable: true,
      position: 'start',
      pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
      appearSpeed: 150,
      moveSpeed: 150,
      onDragStart: onDragStart,
      onDrop: onDrop,
      onSnapEnd: onSnapEnd
    });

    // ==================================================================
    // Helpers
    // ==================================================================
    function categoryClass(cat) {
      const map = {
        'Отличный':      'cat-excellent',
        'Хороший':       'cat-good',
        'Неточность':    'cat-inaccuracy',
        'Ошибка':        'cat-mistake',
        'Зевок':         'cat-blunder',
        'Бриллиантовый': 'cat-brilliant',
      };
      return map[cat] || '';
    }

    function formatEval(m) {
      if (m && m.score_display && m.score_display.startsWith('#')) {
        return m.score_display;
      }
      const cp = m ? m.eval : 0;
      const val = (cp / 100).toFixed(1);
      return cp > 0 ? `+${val}` : val;
    }

    // ==================================================================
    // Eval display
    // ==================================================================
    function updateEvalDisplay() {
      const el = document.getElementById('evalScore');
      const bar = document.getElementById('evalBar');
      bar.style.visibility = 'visible';

      if (currentIdx < 0) {
        el.textContent = '0.0';
        el.className = 'eval-score equal';
        return;
      }
      const m = getCurrentMoveData();
      if (!m) return;
      const display = formatEval(m);
      el.textContent = display;

      if (display.startsWith('#')) {
        el.className = 'eval-score mate';
      } else if (m.eval > 30) {
        el.className = 'eval-score white-advantage';
      } else if (m.eval < -30) {
        el.className = 'eval-score black-advantage';
      } else {
        el.className = 'eval-score equal';
      }
    }

    // ==================================================================
    // Chart
    // ==================================================================
    function buildChart() {
      const ctx = document.getElementById('evalChart').getContext('2d');
      const activeMoves = getActiveMovesList();
      const labels = activeMoves.map((m, i) => {
        const num = Math.floor(i / 2) + 1;
        return m.color === 'white' ? `${num}.` : `${num}…`;
      });
      const data = activeMoves.map(m => {
          let e = parseFloat(m.eval) || 0;
          if (m.score_display && (m.score_display.startsWith('#') || m.score_display.startsWith('M'))) {
              e = (e > 0 || !m.score_display.includes('-')) ? 1000 : -1000;
          }
          return Math.max(-1000, Math.min(1000, e)) / 100;
      });

      if (evalChart) {
          evalChart.data.labels = labels;
          evalChart.data.datasets[0].data = data;
          evalChart.update('none');
      } else {
          evalChart = new Chart(ctx, {
            type: 'line',
            data: {
              labels,
              datasets: [{
                data,
                borderColor: '#a78bfa',
                borderWidth: 2,
                pointRadius: 0,
                pointHitRadius: 8,
                tension: 0.3,
                fill: {
                  target: { value: 0 },
                  above: 'rgba(167,139,250,0.12)',
                  below: 'rgba(239,68,68,0.12)',
                },
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              animation: { duration: 300 },
              plugins: {
                legend: { display: false },
                tooltip: {
                  backgroundColor: '#1e1e2a',
                  titleColor: '#e2e2e8',
                  bodyColor: '#a0a0b4',
                  borderColor: '#2a2a3a',
                  borderWidth: 1,
                  callbacks: {
                    label: (ctx) => `${ctx.parsed.y > 0 ? '+' : ''}${ctx.parsed.y.toFixed(1)}`,
                  },
                },
                annotation: {
                  annotations: {
                    zeroLine: {
                      type: 'line',
                      yMin: 0, yMax: 0,
                      borderColor: '#52526a',
                      borderWidth: 1,
                      borderDash: [4, 4],
                    },
                    currentMove: {
                      type: 'line',
                      xMin: 0, xMax: 0,
                      borderColor: '#facc15',
                      borderWidth: 2,
                      display: false,
                    },
                  },
                },
              },
              scales: {
                x: {
                  ticks: { color: '#52526a', font: { size: 9 }, maxTicksLimit: 20 },
                  grid: { color: 'rgba(255,255,255,0.03)' },
                },
                y: {
                  ticks: {
                    color: '#52526a', font: { size: 10 },
                    callback: (v) => (v > 0 ? '+' : '') + v,
                  },
                  grid: { color: 'rgba(255,255,255,0.04)' },
                  suggestedMin: -5, suggestedMax: 5,
                },
              },
              onClick: (evt) => {
                const points = evalChart.getElementsAtEventForMode(evt, 'nearest', { intersect: false }, true);
                if (points.length) goToIndex(points[0].index);
              },
            },
          });
      }
    }

    function updateChartIndicator() {
      if (!evalChart) return;
      const ann = evalChart.options.plugins.annotation.annotations.currentMove;
      if (currentIdx < 0) {
        ann.display = false;
      } else {
        ann.display = true;
        ann.xMin = currentIdx;
        ann.xMax = currentIdx;
      }
      evalChart.update('none');
    }

    // ==================================================================
    // Info panel + Gemini comment
    // ==================================================================
    function updateInfoPanel() {
      const icon = document.getElementById('moveIcon');
      const san  = document.getElementById('moveSan');
      const cat  = document.getElementById('moveCategory');
      const cpl  = document.getElementById('moveCpl');
      const counter = document.getElementById('moveCounter');
      const gemini  = document.getElementById('geminiComment');

      if (currentIdx < 0) {
        icon.textContent = '♟';
        san.textContent  = 'Начальная позиция';
        cat.textContent  = '';
        cat.className    = 'move-category';
        cpl.textContent  = '';
        counter.textContent = `0 / ${getActiveMovesList().length}`;
        gemini.textContent = 'Выберите ход для получения совета';
        gemini.className = 'gemini-comment empty';
      } else {
        const m = getCurrentMoveData();
        if (m) {
            const moveNum = Math.floor(currentIdx / 2) + 1;
      clearBestMoveHighlight();
      if (currentIdx < 0 || currentIdx >= movesData.length) {
        document.getElementById('moveSan').textContent = '—';
        document.getElementById('moveCategory').textContent = '—';
        document.getElementById('moveCpl').textContent = '';
        document.getElementById('geminiComment').textContent = '—';
        document.getElementById('moveCounter').textContent = '— / —';
        document.getElementById('openingName').style.display = 'none';
        document.getElementById('infoCoachAvatar').textContent = '😐';
        return;
      }
      
      const m = movesData[currentIdx];
      document.getElementById('moveSan').textContent = m.san;
      document.getElementById('moveCategory').textContent = m.category;
      
      if (m.cpl > 0) {
        document.getElementById('moveCpl').textContent = `Потеря: ${m.cpl} cp`;
      } else {
        document.getElementById('moveCpl').textContent = 'Точный ход';
      }

      if (m.opening) {
        document.getElementById('openingName').textContent = m.opening;
        document.getElementById('openingName').style.display = 'inline-block';
      } else {
        document.getElementById('openingName').style.display = 'none';
      }

      // Coach emotion
      let emotion = '😐';
      if (m.cat_key === 'blunder' || m.cat_key === 'mistake') {
        emotion = '😱';
        // Highlight best move if available
        if (m.best_move) {
          const fromSq = m.best_move.substring(0, 2);
          const toSq = m.best_move.substring(2, 4);
          $('#board .square-' + fromSq).addClass('highlight-best-move');
          $('#board .square-' + toSq).addClass('highlight-best-move');
        }
      } else if (m.cat_key === 'book') {
        emotion = '🤓';
      } else if (['brilliant', 'great', 'best', 'excellent'].includes(m.cat_key)) {
        emotion = '😃';
      }
      document.getElementById('infoCoachAvatar').textContent = emotion;

      const commEl = document.getElementById('geminiComment');
      if (m.comment) {
        commEl.textContent = m.comment;
        commEl.className = 'gemini-comment';
      } else {
        commEl.textContent = 'Ожидание комментария...';
        commEl.className = 'gemini-comment empty';
      }

      const total = movesData.length;
      document.getElementById('moveCounter').textContent = `Ход ${currentIdx + 1} из ${total}`;

      // Update active chip
      document.querySelectorAll('.move-chip').forEach(c => c.classList.remove('active'));
      const activeChip = document.querySelector(`.move-chip[data-index="${currentIdx}"]`);
      if (activeChip) {
        activeChip.classList.add('active');
        activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      updateEvalDisplay();
      updateChartIndicator();
    }

    // ==================================================================
    // Navigation
    // ==================================================================
    function goToIndex(idx, isVariationMove = false) {
      chess_game.reset();
      
      if (!inVariation || !isVariationMove) {
        // We are clicking mainline or we are in variation but clicked a mainline chip
        if (inVariation && !isVariationMove) {
            if (idx <= branchPoint) {
                exitVariation();
                return; // exitVariation calls goToIndex(branchPoint)
            } else {
                exitVariation(); // Exit variation to jump further in mainline
            }
        }
        if (idx >= 0) {
          for (let i = 0; i <= idx && i < movesData.length; i++) {
            chess_game.move(movesData[i].san);
          }
        }
      } else {
        // Playing through variation tree
        if (branchPoint >= 0) {
          for (let i = 0; i <= branchPoint && i < movesData.length; i++) {
            chess_game.move(movesData[i].san);
          }
        }
        const varIdx = idx - branchPoint - 1;
        if (varIdx >= 0) {
            for (let i = 0; i <= varIdx && i < variationMoves.length; i++) {
              chess_game.move(variationMoves[i].san);
            }
        }
      }
      
      currentIdx = idx;
      board.position(chess_game.fen(), true);
      updateInfoPanel();
    }

    // ==================================================================
    // Move chips
    // ==================================================================
    function getCatDef(key) {
      return CAT_DEFS.find(c => c.key === key) || { icon: '', css: '' };
    }

    function buildMoveChips() {
      const container = document.getElementById('movesList');
      container.innerHTML = '';
      const limit = inVariation ? branchPoint : movesData.length - 1;
      for (let i = 0; i <= limit; i++) {
        const m = movesData[i];
        const chip = document.createElement('span');
        chip.className = 'move-chip';
        chip.dataset.index = i;
        const moveNum = Math.floor(i / 2) + 1;
        const prefix = m.color === 'white' ? `${moveNum}. ` : (i === 0 ? `${moveNum}... ` : '');
        
        const cat = getCatDef(m.cat_key);
        let badgeHtml = '';
        if (cat.icon) {
          badgeHtml = `<span class="chip-badge ${cat.css}">${cat.icon}</span>`;
        }

        chip.innerHTML = `${badgeHtml}${prefix}${m.san}`;
        chip.addEventListener('click', () => goToIndex(i, false));
        container.appendChild(chip);
      }

      if (inVariation && variationMoves.length > 0) {
        const div = document.createElement('div');
        div.style.width = '100%'; div.style.height = '4px'; div.style.background = 'transparent';
        container.appendChild(div);
        
        for (let i = 0; i < variationMoves.length; i++) {
          const m = variationMoves[i];
          const chip = document.createElement('span');
          chip.className = 'move-chip variation-chip';
          const actualIndex = branchPoint + 1 + i;
          const moveNum = Math.floor(actualIndex / 2) + 1;
          const prefix = m.color === 'white' ? `${moveNum}. ` : (i === 0 ? `${moveNum}... ` : '');
          
          const cat = getCatDef(m.cat_key || 'good');
          let badgeHtml = '';
          if (cat.icon) {
            badgeHtml = `<span class="chip-badge ${cat.css}">${cat.icon}</span>`;
          }

          chip.innerHTML = `${badgeHtml}${prefix}${m.san}`;
          chip.addEventListener('click', () => goToIndex(actualIndex, true));
          container.appendChild(chip);
        }
      }
    }

    // ==================================================================
    // Nav buttons
    // ==================================================================
    document.getElementById('btnStart').addEventListener('click', () => goToIndex(-1, false));
    document.getElementById('btnPrev').addEventListener('click', () => {
      if (currentIdx > -1) {
          if (inVariation && currentIdx === branchPoint + 1) {
              exitVariation();
          } else {
              goToIndex(currentIdx - 1, inVariation);
          }
      }
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      if (inVariation) {
          if (currentIdx - branchPoint - 1 < variationMoves.length - 1) {
              goToIndex(currentIdx + 1, true);
          }
      } else {
          if (currentIdx < movesData.length - 1) {
              goToIndex(currentIdx + 1, false);
          }
      }
    });
    document.getElementById('btnEnd').addEventListener('click', () => {
      if (inVariation) {
          if (variationMoves.length) goToIndex(branchPoint + variationMoves.length, true);
      } else {
          if (movesData.length) goToIndex(movesData.length - 1, false);
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowLeft')  document.getElementById('btnPrev').click();
      if (e.key === 'ArrowRight') document.getElementById('btnNext').click();
      if (e.key === 'Home')       document.getElementById('btnStart').click();
      if (e.key === 'End')        document.getElementById('btnEnd').click();
    });

    // ==================================================================
    // Load from Chess.com
    // ==================================================================
    document.getElementById('loadChesscomBtn').addEventListener('click', async () => {
      const username = document.getElementById('usernameInput').value.trim();
      if (!username) return;

      const btn = document.getElementById('loadChesscomBtn');
      const status = document.getElementById('status');

      btn.disabled = true;
      btn.textContent = '⏳…';
      status.className = 'status';
      status.textContent = `Загружаю последнюю партию ${username}…`;

      try {
        const resp = await fetch(`/get_latest_game/${encodeURIComponent(username)}`);
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        document.getElementById('pgnInput').value = data.pgn;
        status.className = 'status success';
        status.textContent = `✓ PGN загружен` + (data.url ? ` · ${data.url}` : '');
      } catch (e) {
        status.className = 'status error';
        status.textContent = `✗ ${e.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = '♟ Загрузить';
      }
    });

    // ==================================================================
    // Analyze
    // ==================================================================
    document.getElementById('analyzeBtn').addEventListener('click', async () => {
      const pgn = document.getElementById('pgnInput').value.trim();
      if (!pgn) return;

      const btn = document.getElementById('analyzeBtn');
      const status = document.getElementById('status');

      btn.disabled = true;
      btn.textContent = '⏳ Анализ…';
      status.className = 'status';
      status.textContent = 'Stockfish анализирует + Gemini комментирует… Это может занять время.';

      try {
        const resp = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pgn }),
        });

        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }

        const data = await resp.json();
        movesData = data.moves_data;
        currentIdx = -1;
        inVariation = false;
        branchPoint = -1;
        variationMoves = [];
        document.getElementById('returnMainBtn').style.display = 'none';

        chess_game.reset();
        board.position('start', false);

        document.getElementById('tabsContainer').style.display = 'flex';
        showTab('report');
        document.getElementById('chartWrap').style.display = '';

        buildMoveChips();
        buildChart();
        updateInfoPanel();

        // Render Game Report
        if (data.stats) renderReport(data.stats, data.elo_verdict, data.coach_summary);

        const hasComments = movesData.some(m => m.comment);
        status.className = 'status success';
        status.textContent = `✓ ${movesData.length} ходов` +
          (hasComments ? ' · Комментарии Gemini загружены' : ' · Без комментариев Gemini');
      } catch (e) {
        status.className = 'status error';
        status.textContent = `✗ ${e.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍 Анализировать';
      }
    });

    // ==================================================================
    // Game Report (Chess.com style)
    // ==================================================================
    const CAT_DEFS = [
      { key: 'brilliant',  icon: '!!', label: 'Блестящий',     css: 'cat-brilliant' },
      { key: 'great',      icon: '!',  label: 'Замечательный', css: 'cat-great' },
      { key: 'best',       icon: '⭐', label: 'Лучший',        css: 'cat-best' },
      { key: 'excellent',  icon: '👍', label: 'Отлично',       css: 'cat-excellent' },
      { key: 'good',       icon: '✅', label: 'Хорошо',        css: 'cat-good' },
      { key: 'book',       icon: '📖', label: 'Теоретический', css: 'cat-book' },
      { key: 'inaccuracy', icon: '?!', label: 'Неточность',    css: 'cat-inaccuracy' },
      { key: 'mistake',    icon: '?',  label: 'Ошибка',        css: 'cat-mistake' },
      { key: 'miss',       icon: '❌', label: 'Упущение',      css: 'cat-miss' },
      { key: 'blunder',    icon: '??', label: 'Зевок',         css: 'cat-blunder' },
    ];

    function showTab(tabName) {
      if (tabName === 'moves') {
        document.getElementById('tabMoves').classList.add('active');
        document.getElementById('tabReport').classList.remove('active');
        document.getElementById('contentMoves').style.display = 'block';
        document.getElementById('reportCard').style.display = 'none';
      } else {
        document.getElementById('tabReport').classList.add('active');
        document.getElementById('tabMoves').classList.remove('active');
        document.getElementById('reportCard').style.display = 'flex';
        document.getElementById('contentMoves').style.display = 'none';
      }
    }

    document.getElementById('tabMoves').addEventListener('click', () => showTab('moves'));
    document.getElementById('tabReport').addEventListener('click', () => showTab('report'));

    function stageIcon(status) {
      if (status === 'check') return '<span class="stage-check">✔</span>';
      if (status === 'thumb') return '<span class="stage-thumb">👍</span>';
      return '<span class="stage-inacc">?!</span>';
    }

    function renderReport(stats, eloVerdict, coachSummary) {
      const card = document.getElementById('reportCard');
      card.style.display = 'flex';

      // Coach
      document.getElementById('coachBubble').textContent =
        coachSummary || 'Партия проанализирована. Изучите отчёт ниже!';

      // Accuracy — determine winner
      const wAcc = stats.white.accuracy;
      const bAcc = stats.black.accuracy;
      const wBlock = document.getElementById('whiteAccBlock');
      const bBlock = document.getElementById('blackAccBlock');
      wBlock.className = 'player-acc-block ' + (wAcc >= bAcc ? 'winner' : 'loser');
      bBlock.className = 'player-acc-block ' + (bAcc >= wAcc ? 'winner' : 'loser');

      document.getElementById('whiteAccPct').textContent = wAcc + '%';
      document.getElementById('blackAccPct').textContent = bAcc + '%';
      document.getElementById('whiteAccBar').style.width = wAcc + '%';
      document.getElementById('blackAccBar').style.width = bAcc + '%';

      // Category grid — build dynamically
      const grid = document.getElementById('catGrid');
      grid.innerHTML = '';
      CAT_DEFS.forEach(cat => {
        const wVal = stats.white[cat.key] || 0;
        const bVal = stats.black[cat.key] || 0;
        if (wVal === 0 && bVal === 0) return; // hide empty categories
        const row = document.createElement('div');
        row.className = 'cat-row';
        row.innerHTML =
          `<div class="cat-cnt-w">${wVal}</div>` +
          `<div class="cat-icon-circle ${cat.css}">${cat.icon}</div>` +
          `<div class="cat-cnt-b">${bVal}</div>`;
        grid.appendChild(row);
      });

      // ELO
      const wElo = stats.white.elo || '—';
      const bElo = stats.black.elo || '—';
      document.getElementById('eloWhite').textContent = wElo;
      document.getElementById('eloBlack').textContent = bElo;
      const eloW = document.getElementById('eloBlockW');
      const eloB = document.getElementById('eloBlockB');
      eloW.className = 'elo-block ' + (wElo >= bElo ? 'elo-high' : 'elo-low');
      eloB.className = 'elo-block ' + (bElo >= wElo ? 'elo-high' : 'elo-low');

      // Stages
      if (stats.white.stages) {
        document.getElementById('stageOpenW').innerHTML = stageIcon(stats.white.stages.opening);
        document.getElementById('stageOpenB').innerHTML = stageIcon(stats.black.stages.opening);
        document.getElementById('stageMidW').innerHTML = stageIcon(stats.white.stages.middlegame);
        document.getElementById('stageMidB').innerHTML = stageIcon(stats.black.stages.middlegame);
        document.getElementById('stageEndW').innerHTML = stageIcon(stats.white.stages.endgame);
        document.getElementById('stageEndB').innerHTML = stageIcon(stats.black.stages.endgame);
      }
    }

    // New game button
    document.getElementById('btnNewGame').addEventListener('click', () => {
      document.getElementById('pgnInput').value = '';
      document.getElementById('tabsContainer').style.display = 'none';
      document.getElementById('reportCard').style.display = 'none';
      document.getElementById('contentMoves').style.display = 'none';
      document.getElementById('chartWrap').style.display = 'none';
      document.getElementById('movesList').innerHTML = '';
      movesData = [];
      currentIdx = -1;
      chess_game.reset();
      board.position('start', false);
    });

    // View report button — switch to moves tab and scroll to first move
    document.getElementById('btnViewReport').addEventListener('click', () => {
      showTab('moves');
      if (movesData.length) goToIndex(0, false);
    });
  </script>

</body>
</html>
